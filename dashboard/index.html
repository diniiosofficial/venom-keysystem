<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGACY CORE DASHBOARD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020204;
            --surface: rgba(12, 12, 22, 0.65);
            --surface-elevated: rgba(18, 18, 32, 0.8);
            --primary: #00f0ff;
            --primary-dim: rgba(0, 240, 255, 0.08);
            --primary-glow: rgba(0, 240, 255, 0.3);
            --accent: #ffd700;
            --accent-dim: rgba(255, 215, 0, 0.1);
            --text: #f0f0f5;
            --text-dim: #6b6b7b;
            --success: #00ff9d;
            --error: #ff3860;
            --warning: #ff9500;
            --border: rgba(255, 255, 255, 0.05);
            --border-hover: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            cursor: none;
        }

        /* ===== PRELOADER ===== */
        .preloader {
            position: fixed; inset: 0; z-index: 100000;
            background: var(--bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
        }
        .preloader.done { opacity: 0; visibility: hidden; pointer-events: none; }
        .preloader-logo {
            font-size: 14px; font-weight: 700;
            letter-spacing: 0.3em; text-transform: uppercase;
            color: var(--text-dim); margin-bottom: 40px;
        }
        .preloader-logo span { color: var(--primary); }
        .preloader-bar {
            width: 200px; height: 1px;
            background: rgba(255,255,255,0.05);
            position: relative; overflow: hidden;
        }
        .preloader-bar::after {
            content: ''; position: absolute; left: 0; top: 0;
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            animation: loadBar 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes loadBar { 0% { width: 0%; } 50% { width: 60%; } 100% { width: 100%; } }
        .preloader-percent {
            margin-top: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em;
        }

        /* ===== CURSOR ===== */
        .cursor {
            position: fixed; width: 8px; height: 8px;
            background: var(--primary); border-radius: 50%;
            pointer-events: none; z-index: 99999;
            mix-blend-mode: difference;
            transition: transform 0.15s ease, width 0.3s ease, height 0.3s ease;
            transform: translate(-50%, -50%);
        }
        .cursor.hover {
            width: 40px; height: 40px;
            background: transparent;
            border: 1.5px solid var(--primary);
            mix-blend-mode: normal;
        }
        .cursor-trail {
            position: fixed; width: 30px; height: 30px;
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 50%; pointer-events: none; z-index: 99998;
            transform: translate(-50%, -50%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ===== BACKGROUND ===== */
        #bg-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }
        .noise {
            position: fixed; inset: 0; z-index: 1;
            pointer-events: none; opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat; background-size: 256px 256px;
        }
        .vignette {
            position: fixed; inset: 0; z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 0%, transparent 40%, rgba(0,0,0,0.6) 100%);
        }

        /* ===== FLOATING SHAPES ===== */
        .geo-shape {
            position: fixed; pointer-events: none; z-index: 1; opacity: 0.04;
        }
        .geo-ring {
            width: 400px; height: 400px;
            border: 1px solid var(--primary); border-radius: 50%;
            top: 10%; right: -100px;
            animation: geoFloat1 25s ease-in-out infinite;
        }
        .geo-ring-2 {
            width: 300px; height: 300px;
            border: 1px solid var(--accent); border-radius: 50%;
            bottom: 15%; left: -80px;
            animation: geoFloat2 30s ease-in-out infinite;
        }
        .geo-diamond {
            width: 150px; height: 150px;
            border: 1px solid var(--primary); transform: rotate(45deg);
            top: 60%; right: 15%;
            animation: geoFloat3 20s ease-in-out infinite;
        }
        @keyframes geoFloat1 { 0%,100% { transform: translate(0,0) rotate(0deg); } 33% { transform: translate(-30px, 40px) rotate(120deg); } 66% { transform: translate(20px, -20px) rotate(240deg); } }
        @keyframes geoFloat2 { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(40px, -30px) rotate(180deg); } }
        @keyframes geoFloat3 { 0%,100% { transform: translate(0,0) rotate(45deg); } 50% { transform: translate(-20px, 30px) rotate(225deg); } }

        /* ===== TOPBAR ===== */
        .topbar {
            position: relative; z-index: 10;
            min-height: 75px;
            background: linear-gradient(180deg, rgba(14,14,26,0.8) 0%, rgba(12,12,22,0.6) 100%);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            flex-wrap: wrap; gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .logo {
            font-size: 22px; font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex; align-items: center; gap: 12px;
        }
        .logo svg {
            width: 32px; height: 32px;
            filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.3));
        }
        .top-buttons {
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .top-btn {
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, #00c8d4 100%);
            color: #000;
            padding: 12px 22px;
            border-radius: 12px;
            cursor: none;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.02em;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.15);
        }
        .top-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .top-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 240, 255, 0.3);
        }
        .top-btn:hover::before { opacity: 1; }
        .top-btn span { position: relative; z-index: 2; }
        .logout {
            background: linear-gradient(135deg, var(--error) 0%, #ff6b81 100%);
            box-shadow: 0 4px 20px rgba(255, 56, 96, 0.15);
        }
        .logout:hover {
            box-shadow: 0 8px 30px rgba(255, 56, 96, 0.3);
        }

        /* ===== CONTAINER ===== */
        .container {
            position: relative; z-index: 10;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== STATS ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(165deg, rgba(14,14,26,0.7) 0%, rgba(8,8,18,0.5) 100%);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .stat-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.3;
            transition: opacity 0.4s ease;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 240, 255, 0.15);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 40px rgba(0, 240, 255, 0.04);
        }
        .stat-card:hover::before { opacity: 0.8; }
        .stat-card h2 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .stat-card h2 svg {
            width: 14px; height: 14px;
            opacity: 0.6;
        }
        .stat-card span {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'JetBrains Mono', monospace;
        }
        .stat-card:nth-child(2) span { background: linear-gradient(135deg, #fff 0%, var(--success) 100%); -webkit-background-clip: text; }
        .stat-card:nth-child(3) span { background: linear-gradient(135deg, #fff 0%, var(--error) 100%); -webkit-background-clip: text; }
        .stat-card:nth-child(4) span { background: linear-gradient(135deg, #fff 0%, var(--accent) 100%); -webkit-background-clip: text; }

        /* ===== TABLE ===== */
        .table-box {
            background: linear-gradient(165deg, rgba(14,14,26,0.6) 0%, rgba(8,8,18,0.4) 100%);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            position: relative;
        }
        .table-box::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
            opacity: 0.4;
        }
        .table-header {
            padding: 24px 28px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.01em;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
            position: relative; z-index: 2;
        }
        .table-header svg {
            width: 18px; height: 18px;
            color: var(--primary);
        }
        .table-wrap {
            overflow-x: auto;
            position: relative; z-index: 2;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 950px;
        }
        th {
            background: rgba(255,255,255,0.02);
            padding: 18px 24px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 18px 24px;
            border-top: 1px solid var(--border);
            font-size: 14px;
            color: var(--text);
            transition: all 0.3s ease;
        }
        tr {
            transition: all 0.3s ease;
        }
        tr:hover {
            background: rgba(0, 240, 255, 0.02);
        }
        tr:hover td {
            color: #fff;
        }

        /* ===== STATUS ===== */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .status-badge::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
        }
        .status-active {
            background: rgba(0, 255, 157, 0.08);
            border: 1px solid rgba(0, 255, 157, 0.15);
            color: var(--success);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.05);
        }
        .status-active::before {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }
        .status-disabled {
            background: rgba(255, 149, 0, 0.08);
            border: 1px solid rgba(255, 149, 0, 0.15);
            color: var(--warning);
            box-shadow: 0 0 15px rgba(255, 149, 0, 0.05);
        }
        .status-disabled::before {
            background: var(--warning);
            box-shadow: 0 0 8px var(--warning);
        }
        .status-expired {
            background: rgba(255, 56, 96, 0.08);
            border: 1px solid rgba(255, 56, 96, 0.15);
            color: var(--error);
            box-shadow: 0 0 15px rgba(255, 56, 96, 0.05);
        }
        .status-expired::before {
            background: var(--error);
            box-shadow: 0 0 8px var(--error);
        }

        /* ===== KEY CELL ===== */
        .key-cell {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.02em;
        }

        /* ===== ACTION BUTTONS ===== */
        .action-btn {
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: none;
            color: #000;
            margin-right: 6px;
            margin-bottom: 5px;
            font-size: 11px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .action-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .action-btn:hover {
            transform: translateY(-2px);
        }
        .action-btn:hover::before { opacity: 1; }
        .action-btn span { position: relative; z-index: 2; }
        .disable-btn {
            background: linear-gradient(135deg, var(--warning) 0%, #ffb84d 100%);
            box-shadow: 0 4px 15px rgba(255, 149, 0, 0.2);
        }
        .disable-btn:hover { box-shadow: 0 6px 20px rgba(255, 149, 0, 0.35); }
        .delete-btn {
            background: linear-gradient(135deg, var(--error) 0%, #ff6b81 100%);
            box-shadow: 0 4px 15px rgba(255, 56, 96, 0.2);
        }
        .delete-btn:hover { box-shadow: 0 6px 20px rgba(255, 56, 96, 0.35); }
        .reset-btn {
            background: linear-gradient(135deg, var(--primary) 0%, #00c8d4 100%);
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.2);
        }
        .reset-btn:hover { box-shadow: 0 6px 20px rgba(0, 240, 255, 0.35); }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 40px; left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: rgba(12, 12, 22, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 14px;
            padding: 16px 28px;
            display: flex; align-items: center; gap: 12px;
            font-size: 14px; font-weight: 600;
            color: var(--success);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0, 255, 157, 0.1);
            z-index: 1000; opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.error {
            border-color: rgba(255, 56, 96, 0.2);
            color: var(--error);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(255, 56, 96, 0.1);
        }
        .toast svg { width: 20px; height: 20px; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .topbar { flex-direction: column; align-items: flex-start; }
            .top-buttons { width: 100%; }
            .top-btn { flex: 1; }
        }
        @media (max-width: 560px) {
            .container { padding: 20px 16px; }
            .stat-card { padding: 22px; }
            .cursor, .cursor-trail { display: none; }
            body { cursor: auto; }
            .top-btn, .action-btn { cursor: pointer; }
        }
    </style>

    <script>
        // ===== PRELOADER =====
        const preloader = document.getElementById('preloader');
        const preloaderPercent = document.getElementById('preloaderPercent');
        let loadProgress = 0;
        const loadInterval = setInterval(() => {
            loadProgress += Math.random() * 15 + 5;
            if (loadProgress >= 100) {
                loadProgress = 100;
                clearInterval(loadInterval);
                setTimeout(() => { preloader.classList.add('done'); }, 400);
            }
            preloaderPercent.textContent = Math.floor(loadProgress) + '%';
        }, 120);

        // ===== CURSOR =====
        const cursor = document.getElementById('cursor');
        const cursorTrail = document.getElementById('cursorTrail');
        let mouseX = 0, mouseY = 0;
        let trailX = 0, trailY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
        });
        function animateCursor() {
            trailX += (mouseX - trailX) * 0.15;
            trailY += (mouseY - trailY) * 0.15;
            cursorTrail.style.left = trailX + 'px';
            cursorTrail.style.top = trailY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();
        document.querySelectorAll('button').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        // ===== 3D PARTICLE BACKGROUND =====
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let rotX = 0, rotY = 0, targetRotX = 0, targetRotY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const PARTICLE_COUNT = 350;
        const SPHERE_RADIUS = Math.min(window.innerWidth, window.innerHeight) * 0.35;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = SPHERE_RADIUS * (0.3 + Math.random() * 0.7);
            particles.push({
                x: r * Math.sin(phi) * Math.cos(theta),
                y: r * Math.sin(phi) * Math.sin(theta),
                z: r * Math.cos(phi),
                baseX: r * Math.sin(phi) * Math.cos(theta),
                baseY: r * Math.sin(phi) * Math.sin(theta),
                baseZ: r * Math.cos(phi),
                size: Math.random() * 1.5 + 0.5,
                opacity: Math.random() * 0.6 + 0.2,
                speed: Math.random() * 0.002 + 0.001
            });
        }

        function project3D(x, y, z) {
            const fov = 800;
            const scale = fov / (fov + z);
            return { x: x * scale + canvas.width / 2, y: y * scale + canvas.height / 2, scale, z };
        }
        function rotate3D(x, y, z, rx, ry) {
            let x1 = x * Math.cos(ry) - z * Math.sin(ry);
            let z1 = x * Math.sin(ry) + z * Math.cos(ry);
            let y2 = y * Math.cos(rx) - z1 * Math.sin(rx);
            let z2 = y * Math.sin(rx) + z1 * Math.cos(rx);
            return { x: x1, y: y2, z: z2 };
        }

        let time = 0;
        function animateBG() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += 0.003;
            rotX += (targetRotX - rotX) * 0.05;
            rotY += (targetRotY - rotY) * 0.05;
            rotY += 0.002;

            const projected = [];
            particles.forEach((p, i) => {
                const orbitSpeed = p.speed * 50;
                const angle = time * orbitSpeed + i;
                const orbitRadius = 20;
                const ox = p.baseX + Math.cos(angle) * orbitRadius;
                const oy = p.baseY + Math.sin(angle * 0.7) * orbitRadius;
                const oz = p.baseZ + Math.sin(angle * 0.5) * orbitRadius;
                const rotated = rotate3D(ox, oy, oz, rotX, rotY);
                const proj = project3D(rotated.x, rotated.y, rotated.z);
                proj.opacity = p.opacity * (0.5 + 0.5 * ((rotated.z + SPHERE_RADIUS) / (2 * SPHERE_RADIUS)));
                proj.size = p.size * proj.scale;
                projected.push({ ...proj, original: p });
            });

            projected.sort((a, b) => b.z - a.z);

            for (let i = 0; i < projected.length; i++) {
                for (let j = i + 1; j < Math.min(i + 8, projected.length); j++) {
                    const dx = projected[i].x - projected[j].x;
                    const dy = projected[i].y - projected[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        const alpha = 0.04 * (1 - dist / 120) * projected[i].opacity;
                        ctx.beginPath();
                        ctx.moveTo(projected[i].x, projected[i].y);
                        ctx.lineTo(projected[j].x, projected[j].y);
                        ctx.strokeStyle = `rgba(0, 240, 255, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            projected.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 240, 255, ${p.opacity})`;
                ctx.fill();
                if (p.z > 0) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 240, 255, ${p.opacity * 0.1})`;
                    ctx.fill();
                }
            });

            requestAnimationFrame(animateBG);
        }
        animateBG();

        document.addEventListener('mousemove', (e) => {
            targetRotY = (e.clientX / window.innerWidth - 0.5) * 1.5;
            targetRotX = (e.clientY / window.innerHeight - 0.5) * 1;
        });

        // ===== TOAST =====
        function showToast(msg, isError) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.textContent = msg;
            toast.classList.toggle('error', !!isError);
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

const token =
localStorage.getItem(

const role =
localStorage.getItem(

if(

function logout(){

    localStorage.removeItem(
        'legacy_token'

    localStorage.removeItem(
        'legacy_role'

    window.location =

        // ===== RESET DEVICES =====
        async function resetDevices(key) {
            const confirmReset = confirm('Reset Devices?');
            if (!confirmReset) return;
            try {
                const res = await fetch('/api/reset-devices', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Devices Reset Successfully');
                    loadKeys();
                } else {
                    showToast(data.message || 'Reset Failed', true);
                }
            } catch (e) {
                console.log(e);
                showToast('Server Error', true);
            }
        }

        // ===== DELETE KEY =====
        async function deleteKey(key) {
            const confirmDelete = confirm('Delete Key?');
            if (!confirmDelete) return;
            try {
                const res = await fetch('/api/delete-key', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Key Deletion Completed Successfully');
                    loadStats();
                    loadKeys();
                } else {
                    showToast(data.message || 'Delete Failed', true);
                }
            } catch (e) {
                console.log(e);
                showToast('Server Error', true);
            }
        }

        // ===== TOGGLE KEY =====
        async function toggleKey(key) {
            try {
                const res = await fetch('/api/toggle-key', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Key Status Updated');
                    loadStats();
                    loadKeys();
                } else {
                    showToast(data.message || 'Update Failed', true);
                }
            } catch (e) {
                console.log(e);
                showToast('Server Error', true);
            }

        // ===== LOAD STATS =====
        async function loadStats() {
            try {
                const res = await fetch('/api/dashboard-stats');
                const data = await res.json();
                document.getElementById('totalKeys').innerText = data.total_keys || 0;
                document.getElementById('activeKeys').innerText = data.active_keys || 0;
                document.getElementById('expiredKeys').innerText = data.expired_keys || 0;
                document.getElementById('totalUsers').innerText = data.total_users || 0;
            } catch (e) {
                console.log(e);
            }
        }

        // ===== LOAD KEYS =====
        async function loadKeys() {
            try {
                const res = await fetch('/api/get-keys');
                const data = await res.json();
                const table = document.getElementById('keyTable');
                table.innerHTML = '';

                data.keys.forEach(key => {
                    let hwids = [];
                    if (typeof key.hwids === 'string') {
                        try { hwids = JSON.parse(key.hwids); } catch { hwids = []; }
                    } else if (Array.isArray(key.hwids)) {
                        hwids = key.hwids;
                    }
                    let devicesUsed = hwids.length;

                    let statusClass = "status-active";
                    let displayStatus = key.status;
                    if (key.status === "disabled") {
                        statusClass = "status-disabled";
                    }
                    if (new Date(key.expires_at).getTime() < Date.now()) {
                        statusClass = "status-expired";
                        displayStatus = "expired";
                    }

                    table.innerHTML += `
                    <tr>
                        <td class="key-cell">${key.license_key}</td>
                        <td><span class="status-badge ${statusClass}">${displayStatus}</span></td>
                        <td>${devicesUsed} / ${key.max_devices}</td>
                        <td>${new Date(key.expires_at).toLocaleString()}</td>
                        <td>
                            <button class="action-btn disable-btn" onclick="toggleKey('${key.license_key}')">
                                <span>${key.status === 'active' ? 'Disable' : 'Enable'}</span>
                            </button>
                            <button class="action-btn reset-btn" onclick="resetDevices('${key.license_key}')">
                                <span>Reset</span>
                            </button>
                            <button class="action-btn delete-btn" onclick="deleteKey('${key.license_key}')">
                                <span>Delete</span>
                            </button>
                        </td>
                    </tr>
                    `;
                });

                document.querySelectorAll('button').forEach(el => {
                    el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
                    el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
                });
            } catch (e) {
                console.log(e);
            }
        }
