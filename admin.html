<!DOCTYPE html>
<html>
<head>
  <title>VENOM ADMIN LOGIN</title>

  <style>

    body{
      background:#0d0d0d;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial;
    }

    .box{
      width:320px;
      background:#151515;
      padding:30px;
      border-radius:12px;
    }

    h1{
      color:white;
      text-align:center;
      margin-bottom:25px;
    }

    input{
      width:100%;
      height:45px;
      margin-bottom:15px;
      border:none;
      outline:none;
      padding-left:15px;
      border-radius:8px;
      background:#222;
      color:white;
    }

    button{
      width:100%;
      height:45px;
      border:none;
      border-radius:8px;
      background:#0099ff;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    p{
      color:red;
      text-align:center;
    }

  </style>
</head>

<body>

<div class="box">

  <h1>VENOM ADMIN</h1>

  <input
    type="text"
    id="username"
    placeholder="Username"
  >

  <input
    type="password"
    id="password"
    placeholder="Password"
  >

  <button onclick="login()">
    LOGIN
  </button>

  <p id="msg"></p>

</div>

<script>

async function login(){

  const username =
    document.getElementById("username").value;

  const password =
    document.getElementById("password").value;

  if(
    username === "venomadmin" &&
    password === "venom@2026"
  ){

    localStorage.setItem(
      "venom_admin",
      "true"
    );

    window.location =
      "/dashboard.html";

  }else{

    document.getElementById("msg")
    .innerText =
      "Invalid Login";
  }
}

</script>

</body>
</html>
