<!DOCTYPE html>
<html>
<head>

<title>VENOM DASHBOARD</title>

<style>

body{
    margin:0;
    background:#0d0d0d;
    color:white;
    font-family:Arial;
}

.topbar{
    padding:20px;
    background:#151515;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:#151515;
    padding:25px;
    border-radius:14px;
}

.card h2{
    margin:0;
    font-size:15px;
    color:#aaa;
}

.card span{
    font-size:34px;
    font-weight:bold;
}

.table-box{
    background:#151515;
    padding:20px;
    border-radius:14px;
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1f1f1f;
    padding:15px;
    text-align:left;
}

td{
    padding:15px;
    border-top:1px solid #222;
}

button{
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    color:white;
    margin-right:5px;
}

.delete{
    background:red;
}

.disable{
    background:orange;
}

.reset{
    background:#0099ff;
}

</style>

</head>

<body>

<div class="topbar">
    VENOM DASHBOARD
</div>

<div class="container">

    <!-- STATS -->

    <div class="stats">

        <div class="card">
            <h2>Total Keys</h2>
            <span id="totalKeys">0</span>
        </div>

        <div class="card">
            <h2>Active Keys</h2>
            <span id="activeKeys">0</span>
        </div>

        <div class="card">
            <h2>Expired Keys</h2>
            <span id="expiredKeys">0</span>
        </div>

        <div class="card">
            <h2>Total Users</h2>
            <span id="totalUsers">0</span>
        </div>

    </div>

    <!-- TABLE -->

    <div class="table-box">

        <table>

            <thead>

                <tr>

                    <th>KEY</th>
                    <th>STATUS</th>
                    <th>DEVICES</th>
                    <th>EXPIRY</th>

                </tr>

            </thead>

            <tbody id="keyTable">

            </tbody>

        </table>

    </div>

</div>

<script>

// ----------------------------------
// ADMIN CHECK
// ----------------------------------

if(
    localStorage.getItem(
        "venom_admin"
    ) !== "true"
){
    window.location =
        "/admin.html";
}

// ----------------------------------
// LOAD STATS
// ----------------------------------

async function loadStats(){

    const res =
        await fetch(
            '/api/dashboard-stats'
        );

    const data =
        await res.json();

    document.getElementById(
        'totalKeys'
    ).innerText =
        data.total_keys || 0;

    document.getElementById(
        'activeKeys'
    ).innerText =
        data.active_keys || 0;

    document.getElementById(
        'expiredKeys'
    ).innerText =
        data.expired_keys || 0;

    document.getElementById(
        'totalUsers'
    ).innerText =
        data.total_users || 0;
}

// ----------------------------------
// LOAD KEYS
// ----------------------------------

async function loadKeys(){

    const res =
        await fetch(
            '/api/get-keys'
        );

    const data =
        await res.json();

    const table =
        document.getElementById(
            'keyTable'
        );

    table.innerHTML = '';

    data.keys.forEach(key => {

        const devicesUsed =
            key.hwids
            ? key.hwids.length
            : 0;

        table.innerHTML += `

        <tr>

            <td>
                ${key.license_key}
            </td>

            <td>
                ${key.status}
            </td>

            <td>
                ${devicesUsed}
                /
                ${key.max_devices}
            </td>

            <td>
                ${new Date(
                    key.expires_at
                ).toLocaleString()}
            </td>

        </tr>
        `;
    });
}

// ----------------------------------
// INIT
// ----------------------------------

loadStats();

loadKeys();

</script>

</body>
</html>
