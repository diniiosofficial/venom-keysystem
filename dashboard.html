<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>VENOM DASHBOARD</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b0b;
    color:white;
    font-family:Arial;
}

/* ------------------------------- */
/* TOPBAR */
/* ------------------------------- */

.topbar{

    min-height:75px;

    background:#121212;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:15px 25px;

    border-bottom:1px solid #1f1f1f;

    flex-wrap:wrap;

    gap:15px;
}

.logo{

    font-size:24px;

    font-weight:bold;

    letter-spacing:1px;
}

.top-buttons{

    display:flex;

    gap:12px;

    flex-wrap:wrap;
}

.top-btn{

    border:none;

    background:#0099ff;

    color:white;

    padding:12px 18px;

    border-radius:10px;

    cursor:pointer;

    font-size:14px;

    font-weight:bold;

    transition:0.2s;
}

.top-btn:hover{

    opacity:0.8;
}

.logout{

    background:red;
}

/* ------------------------------- */
/* CONTAINER */
/* ------------------------------- */

.container{

    padding:25px;
}

/* ------------------------------- */
/* STATS */
/* ------------------------------- */

.stats{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:30px;
}

.card{

    background:#141414;

    padding:25px;

    border-radius:16px;

    border:1px solid #1d1d1d;
}

.card h2{

    font-size:15px;

    color:#9a9a9a;

    margin-bottom:10px;
}

.card span{

    font-size:36px;

    font-weight:bold;
}

/* ------------------------------- */
/* TABLE */
/* ------------------------------- */

.table-box{

    background:#141414;

    border-radius:16px;

    overflow:auto;

    border:1px solid #1d1d1d;
}

.table-header{

    padding:20px;

    font-size:18px;

    font-weight:bold;

    border-bottom:1px solid #1d1d1d;
}

table{

    width:100%;

    border-collapse:collapse;

    min-width:950px;
}

th{

    background:#1b1b1b;

    padding:16px;

    text-align:left;

    font-size:14px;

    color:#bdbdbd;
}

td{

    padding:16px;

    border-top:1px solid #1d1d1d;

    font-size:14px;
}

tr:hover{

    background:#181818;
}

/* ------------------------------- */
/* STATUS */
/* ------------------------------- */

.active{

    color:#00ff88;

    font-weight:bold;
}

.disabled{

    color:orange;

    font-weight:bold;
}

.expired{

    color:red;

    font-weight:bold;
}

/* ------------------------------- */
/* BUTTONS */
/* ------------------------------- */

.action-btn{

    border:none;

    padding:8px 14px;

    border-radius:8px;

    cursor:pointer;

    color:white;

    margin-right:6px;

    margin-bottom:5px;

    font-size:12px;

    font-weight:bold;

    transition:0.2s;
}

.action-btn:hover{

    opacity:0.8;
}

.disable-btn{

    background:orange;
}

.delete-btn{

    background:red;
}

.reset-btn{

    background:#0099ff;
}

/* ------------------------------- */
/* MOBILE */
/* ------------------------------- */

@media(max-width:900px){

    .topbar{

        flex-direction:column;

        align-items:flex-start;
    }

    .top-buttons{

        width:100%;
    }

    .top-btn{

        flex:1;
    }
}

</style>

</head>

<body>

<!-- ------------------------------- -->
<!-- TOPBAR -->
<!-- ------------------------------- -->

<div class="topbar">

    <div class="logo">
        VENOM DASHBOARD
    </div>

    <div class="top-buttons">

        <button
        class="top-btn"
        onclick="
        window.location=
        '/generatekey.html'
        ">
            Generate Key
        </button>

        <button
        class="top-btn logout"
        onclick="logout()">
            Logout
        </button>

    </div>

</div>

<!-- ------------------------------- -->
<!-- CONTAINER -->
<!-- ------------------------------- -->

<div class="container">

    <!-- STATS -->

    <div class="stats">

        <div class="card">

            <h2>Total Keys</h2>

            <span id="totalKeys">
                0
            </span>

        </div>

        <div class="card">

            <h2>Active Keys</h2>

            <span id="activeKeys">
                0
            </span>

        </div>

        <div class="card">

            <h2>Expired Keys</h2>

            <span id="expiredKeys">
                0
            </span>

        </div>

        <div class="card">

            <h2>Total Users</h2>

            <span id="totalUsers">
                0
            </span>

        </div>

    </div>

    <!-- TABLE -->

    <div class="table-box">

        <div class="table-header">
            License Keys
        </div>

        <table>

            <thead>

                <tr>

                    <th>KEY</th>

                    <th>STATUS</th>

                    <th>DEVICES</th>

                    <th>EXPIRY</th>

                    <th>ACTIONS</th>

                </tr>

            </thead>

            <tbody id="keyTable">

            </tbody>

        </table>

    </div>

</div>

<script>

// -------------------------------
// ADMIN CHECK
// -------------------------------

if(
    localStorage.getItem(
        "venom_admin"
    ) !== "true"
){

    window.location =
        "/admin.html";
}

// -------------------------------
// LOGOUT
// -------------------------------

function logout(){

    localStorage.removeItem(
        "venom_admin"
    );

    window.location =
        "/admin.html";
}

// -------------------------------
// RESET DEVICES
// -------------------------------

async function resetDevices(key){

    const confirmReset =
        confirm(
            'Reset Devices?'
        );

    if(!confirmReset)
        return;

    try{

        const res =
            await fetch(
                '/api/reset-devices',
                {
                    method:'POST',

                    headers:{
                        'Content-Type':
                        'application/json'
                    },

                    body:JSON.stringify({
                        key
                    })
                }
            );

        const data =
            await res.json();

        if(data.success){

            alert(
                'Devices Reset Successfully'
            );

            loadKeys();

        }else{

            alert(
                data.message ||
                'Reset Failed'
            );
        }

    }catch(e){

        console.log(e);

        alert(
            'Server Error'
        );
    }
}

// -------------------------------
// DELETE KEY
// -------------------------------

async function deleteKey(key){

    const confirmDelete =
        confirm(
            'Delete Key?'
        );

    if(!confirmDelete)
        return;

    try{

        const res =
            await fetch(
                '/api/delete-key',
                {
                    method:'POST',

                    headers:{
                        'Content-Type':
                        'application/json'
                    },

                    body:JSON.stringify({
                        key
                    })
                }
            );

        const data =
            await res.json();

        if(data.success){

            alert(
                'Key Deletion Completed Successfully'
            );

            loadStats();

            loadKeys();

        }else{

            alert(
                data.message ||
                'Delete Failed'
            );
        }

    }catch(e){

        console.log(e);

        alert(
            'Server Error'
        );
    }
}

// -------------------------------
// TOGGLE KEY
// -------------------------------

async function toggleKey(key){

    try{

        const res =
            await fetch(
                '/api/toggle-key',
                {
                    method:'POST',

                    headers:{
                        'Content-Type':
                        'application/json'
                    },

                    body:JSON.stringify({
                        key
                    })
                }
            );

        const data =
            await res.json();

        if(data.success){

            alert(
                'Key Status Updated'
            );

            loadStats();

            loadKeys();

        }else{

            alert(
                data.message ||
                'Update Failed'
            );
        }

    }catch(e){

        console.log(e);

        alert(
            'Server Error'
        );
    }
}

// -------------------------------
// LOAD STATS
// -------------------------------

async function loadStats(){

    try{

        const res =
            await fetch(
                '/api/dashboard-stats'
            );

        const data =
            await res.json();

        document.getElementById(
            'totalKeys'
        ).innerText =
            data.total_keys || 0;

        document.getElementById(
            'activeKeys'
        ).innerText =
            data.active_keys || 0;

        document.getElementById(
            'expiredKeys'
        ).innerText =
            data.expired_keys || 0;

        document.getElementById(
            'totalUsers'
        ).innerText =
            data.total_users || 0;

    }catch(e){

        console.log(e);
    }
}

// -------------------------------
// LOAD KEYS
// -------------------------------

async function loadKeys(){

    try{

        const res =
            await fetch(
                '/api/get-keys'
            );

        const data =
            await res.json();

        const table =
            document.getElementById(
                'keyTable'
            );

        table.innerHTML = '';

        data.keys.forEach(key => {

            let hwids = [];

            if(typeof key.hwids === 'string'){

                try{

                    hwids =
                        JSON.parse(
                            key.hwids
                        );

                }catch{

                    hwids = [];
                }

            }else if(
                Array.isArray(
                    key.hwids
                )
            ){

                hwids =
                    key.hwids;
            }

            let devicesUsed =
                hwids.length;

            // STATUS

            let statusClass =
                "active";

            let displayStatus =
                key.status;

            if(
                key.status ===
                "disabled"
            ){

                statusClass =
                    "disabled";
            }

            // EXPIRED

            if(
                new Date(
                    key.expires_at
                ).getTime()
                <
                Date.now()
            ){

                statusClass =
                    "expired";

                displayStatus =
                    "expired";
            }

            table.innerHTML += `

            <tr>

                <td>
                    ${key.license_key}
                </td>

                <td
                class="${statusClass}">
                    ${displayStatus}
                </td>

                <td>
                    ${devicesUsed}
                    /
                    ${key.max_devices}
                </td>

                <td>
                    ${new Date(
                        key.expires_at
                    ).toLocaleString()}
                </td>

                <td>

                    <button
                    class="action-btn disable-btn"
                    onclick="
                    toggleKey(
                    '${key.license_key}'
                    )
                    ">
                        ${
                            key.status ===
                            'active'
                            ? 'Disable'
                            : 'Enable'
                        }
                    </button>

                    <button
                    class="action-btn reset-btn"
                    onclick="
                    resetDevices(
                    '${key.license_key}'
                    )
                    ">
                        Reset
                    </button>

                    <button
                    class="action-btn delete-btn"
                    onclick="
                    deleteKey(
                    '${key.license_key}'
                    )
                    ">
                        Delete
                    </button>

                </td>

            </tr>
            `;
        });

    }catch(e){

        console.log(e);
    }
}

// -------------------------------
// AUTO REFRESH
// -------------------------------

setInterval(() => {

    loadStats();

    loadKeys();

}, 10000);

// -------------------------------
// INIT
// -------------------------------

loadStats();

loadKeys();

</script>

</body>
</html>
