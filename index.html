<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGACY CORE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020204;
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.3);
            --accent: #ffd700;
            --text: #f0f0f5;
            --text-dim: #6b6b7b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        /* ===== CURSOR ===== */
        .cursor {
            position: fixed; width: 8px; height: 8px;
            background: var(--primary); border-radius: 50%;
            pointer-events: none; z-index: 99999;
            mix-blend-mode: difference;
            transition: transform 0.15s ease, width 0.3s ease, height 0.3s ease;
            transform: translate(-50%, -50%);
        }
        .cursor.hover {
            width: 40px; height: 40px;
            background: transparent;
            border: 1.5px solid var(--primary);
            mix-blend-mode: normal;
        }
        .cursor-trail {
            position: fixed; width: 30px; height: 30px;
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 50%; pointer-events: none; z-index: 99998;
            transform: translate(-50%, -50%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ===== BACKGROUND ===== */
        #bg-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }
        .noise {
            position: fixed; inset: 0; z-index: 1;
            pointer-events: none; opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat; background-size: 256px 256px;
        }
        .vignette {
            position: fixed; inset: 0; z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 0%, transparent 35%, rgba(0,0,0,0.7) 100%);
        }

        /* ===== FLOATING RINGS ===== */
        .geo-shape {
            position: fixed; pointer-events: none; z-index: 1; opacity: 0.04;
        }
        .geo-ring {
            width: 500px; height: 500px;
            border: 1px solid var(--primary); border-radius: 50%;
            top: -10%; right: -10%;
            animation: geoFloat1 25s ease-in-out infinite;
        }
        .geo-ring-2 {
            width: 400px; height: 400px;
            border: 1px solid var(--accent); border-radius: 50%;
            bottom: -10%; right: -10%;
            animation: geoFloat2 30s ease-in-out infinite;
        }
        .geo-diamond {
            width: 200px; height: 200px;
            border: 1px solid var(--primary); transform: rotate(45deg);
            bottom: 20%; left: 10%;
            animation: geoFloat3 20s ease-in-out infinite;
        }
        @keyframes geoFloat1 { 0%,100% { transform: translate(0,0) rotate(0deg); } 33% { transform: translate(-30px, 40px) rotate(120deg); } 66% { transform: translate(20px, -20px) rotate(240deg); } }
        @keyframes geoFloat2 { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(40px, -30px) rotate(180deg); } }
        @keyframes geoFloat3 { 0%,100% { transform: translate(0,0) rotate(45deg); } 50% { transform: translate(-20px, 30px) rotate(225deg); } }

        /* ===== MAIN ===== */
        .main-wrap {
            position: relative; z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* ===== SPLASH ===== */
        .splash {
            text-align: center;
            position: relative;
        }

        .logo-wrap {
            width: 100px; height: 100px;
            margin: 0 auto 40px;
            position: relative;
            animation: logoEntry 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }
        .logo-wrap::before {
            content: ''; position: absolute; inset: -12px;
            border-radius: 50%;
            border: 1px solid rgba(0, 240, 255, 0.1);
            animation: logoPulse 3s ease-in-out infinite;
        }
        .logo-wrap::after {
            content: ''; position: absolute; inset: -24px;
            border-radius: 50%;
            border: 1px solid rgba(255, 215, 0, 0.06);
            animation: logoPulse 3s ease-in-out infinite 0.5s;
        }
        @keyframes logoPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.4; } }
        @keyframes logoEntry {
            from { opacity: 0; transform: scale(0.5) rotate(-30deg); }
            to { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        .logo-wrap svg {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 30px rgba(0, 240, 255, 0.4));
        }

        h1 {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            animation: fadeUp 1.2s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        h1 .line1 {
            display: block;
            background: linear-gradient(135deg, #fff 0%, #a0a0b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h1 .line2 {
            display: block;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 4px;
        }

        .tagline {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            animation: fadeUp 1.2s 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .divider-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 40px auto;
            animation: fadeUp 1.2s 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
            position: relative;
        }
        .divider-line::after {
            content: '';
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            width: 6px; height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
        }

        .redirect-msg {
            margin-top: 28px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            animation: fadeUp 1.2s 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .redirect-msg span {
            color: var(--primary);
            font-weight: 600;
        }

        .progress-ring {
            width: 50px;
            height: 50px;
            margin: 24px auto 0;
            position: relative;
            animation: fadeUp 1.2s 1.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .progress-ring svg {
            width: 100%; height: 100%;
            transform: rotate(-90deg);
        }
        .progress-ring circle {
            fill: none;
            stroke-width: 2;
        }
        .progress-ring .bg {
            stroke: rgba(255,255,255,0.05);
        }
        .progress-ring .progress {
            stroke: url(#ringGrad);
            stroke-linecap: round;
            stroke-dasharray: 138;
            stroke-dashoffset: 138;
            transition: stroke-dashoffset 1s linear;
        }

        .footer-brand {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: rgba(255,255,255,0.08);
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            animation: fadeUp 1.2s 1.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 560px) {
            h1 { font-size: 40px; }
            .logo-wrap { width: 80px; height: 80px; }
            .cursor, .cursor-trail { display: none; }
            body { cursor: auto; }
        }
    </style>
<base target="_blank">
</head>
<body>

    <!-- CURSOR -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-trail" id="cursorTrail"></div>

    <!-- BACKGROUND -->
    <canvas id="bg-canvas"></canvas>
    <div class="noise"></div>
    <div class="vignette"></div>

    <!-- FLOATING SHAPES -->
    <div class="geo-shape geo-ring"></div>
    <div class="geo-shape geo-ring-2"></div>
    <div class="geo-shape geo-diamond"></div>

    <!-- MAIN -->
    <div class="main-wrap">
        <div class="splash">
            <div class="logo-wrap">
                <svg viewBox="0 0 100 100" fill="none">
                    <defs>
                        <linearGradient id="lg" x1="15" y1="15" x2="85" y2="85">
                            <stop stop-color="#00f0ff"/>
                            <stop offset="1" stop-color="#ffd700"/>
                        </linearGradient>
                        <filter id="gl">
                            <feGaussianBlur stdDeviation="4" result="b"/>
                            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                    </defs>
                    <circle cx="50" cy="50" r="47" stroke="url(#lg)" stroke-width="1.2" opacity="0.35"/>
                    <circle cx="50" cy="50" r="38" stroke="url(#lg)" stroke-width="0.6" opacity="0.18"/>
                    <path d="M50 22L66 50L50 62L34 50L50 22Z" fill="url(#lg)" opacity="0.15" filter="url(#gl)"/>
                    <path d="M50 22L66 50L50 62L34 50L50 22Z" stroke="url(#lg)" stroke-width="2" stroke-linejoin="round"/>
                    <circle cx="50" cy="50" r="7" fill="url(#lg)" filter="url(#gl)"/>
                    <circle cx="50" cy="28" r="2" fill="url(#lg)" opacity="0.5"/>
                    <circle cx="66" cy="50" r="2" fill="url(#lg)" opacity="0.5"/>
                    <circle cx="50" cy="72" r="2" fill="url(#lg)" opacity="0.5"/>
                    <circle cx="34" cy="50" r="2" fill="url(#lg)" opacity="0.5"/>
                </svg>
            </div>
            <h1>
                <span class="line1">LEGACY CORE</span>
                <span class="line2">SYSTEMS</span>
            </h1>
            <p class="tagline">Secure Key Infrastructure</p>
            <div class="divider-line"></div>
            <p class="redirect-msg">Redirecting in <span id="countdown">3</span>s</p>
            <div class="progress-ring">
                <svg viewBox="0 0 50 50">
                    <defs>
                        <linearGradient id="ringGrad" x1="0" y1="0" x2="50" y2="50">
                            <stop stop-color="#00f0ff"/>
                            <stop offset="1" stop-color="#ffd700"/>
                        </linearGradient>
                    </defs>
                    <circle class="bg" cx="25" cy="25" r="22"/>
                    <circle class="progress" id="progressCircle" cx="25" cy="25" r="22"/>
                </svg>
            </div>
        </div>
        <div class="footer-brand">LEGACY CORE SYSTEMS v2.0</div>
    </div>

    <script>
        // ===== AUTO REDIRECT =====
        let seconds = 3;
        const countdownEl = document.getElementById('countdown');
        const progressCircle = document.getElementById('progressCircle');
        const totalDash = 138;
        const step = totalDash / seconds;

        progressCircle.style.strokeDashoffset = totalDash;
        setTimeout(() => {
            progressCircle.style.strokeDashoffset = 0;
        }, 100);

        const timer = setInterval(() => {
            seconds--;
            if (countdownEl) countdownEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location = '/login';
            }
        }, 1000);

        // ===== CURSOR =====
        const cursor = document.getElementById('cursor');
        const cursorTrail = document.getElementById('cursorTrail');
        let mouseX = 0, mouseY = 0;
        let trailX = 0, trailY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
        });
        function animateCursor() {
            trailX += (mouseX - trailX) * 0.15;
            trailY += (mouseY - trailY) * 0.15;
            cursorTrail.style.left = trailX + 'px';
            cursorTrail.style.top = trailY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // ===== 3D PARTICLE BACKGROUND =====
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let rotX = 0, rotY = 0, targetRotX = 0, targetRotY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const PARTICLE_COUNT = 400;
        const SPHERE_RADIUS = Math.min(window.innerWidth, window.innerHeight) * 0.4;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = SPHERE_RADIUS * (0.3 + Math.random() * 0.7);
            particles.push({
                x: r * Math.sin(phi) * Math.cos(theta),
                y: r * Math.sin(phi) * Math.sin(theta),
                z: r * Math.cos(phi),
                baseX: r * Math.sin(phi) * Math.cos(theta),
                baseY: r * Math.sin(phi) * Math.sin(theta),
                baseZ: r * Math.cos(phi),
                size: Math.random() * 1.5 + 0.5,
                opacity: Math.random() * 0.6 + 0.2,
                speed: Math.random() * 0.002 + 0.001
            });
        }

        function project3D(x, y, z) {
            const fov = 800;
            const scale = fov / (fov + z);
            return { x: x * scale + canvas.width / 2, y: y * scale + canvas.height / 2, scale, z };
        }
        function rotate3D(x, y, z, rx, ry) {
            let x1 = x * Math.cos(ry) - z * Math.sin(ry);
            let z1 = x * Math.sin(ry) + z * Math.cos(ry);
            let y2 = y * Math.cos(rx) - z1 * Math.sin(rx);
            let z2 = y * Math.sin(rx) + z1 * Math.cos(rx);
            return { x: x1, y: y2, z: z2 };
        }

        let time = 0;
        function animateBG() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += 0.003;
            rotX += (targetRotX - rotX) * 0.05;
            rotY += (targetRotY - rotY) * 0.05;
            rotY += 0.002;

            const projected = [];
            particles.forEach((p, i) => {
                const orbitSpeed = p.speed * 50;
                const angle = time * orbitSpeed + i;
                const orbitRadius = 20;
                const ox = p.baseX + Math.cos(angle) * orbitRadius;
                const oy = p.baseY + Math.sin(angle * 0.7) * orbitRadius;
                const oz = p.baseZ + Math.sin(angle * 0.5) * orbitRadius;
                const rotated = rotate3D(ox, oy, oz, rotX, rotY);
                const proj = project3D(rotated.x, rotated.y, rotated.z);
                proj.opacity = p.opacity * (0.5 + 0.5 * ((rotated.z + SPHERE_RADIUS) / (2 * SPHERE_RADIUS)));
                proj.size = p.size * proj.scale;
                projected.push({ ...proj, original: p });
            });

            projected.sort((a, b) => b.z - a.z);

            for (let i = 0; i < projected.length; i++) {
                for (let j = i + 1; j < Math.min(i + 8, projected.length); j++) {
                    const dx = projected[i].x - projected[j].x;
                    const dy = projected[i].y - projected[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        const alpha = 0.04 * (1 - dist / 120) * projected[i].opacity;
                        ctx.beginPath();
                        ctx.moveTo(projected[i].x, projected[i].y);
                        ctx.lineTo(projected[j].x, projected[j].y);
                        ctx.strokeStyle = `rgba(0, 240, 255, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            projected.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 240, 255, ${p.opacity})`;
                ctx.fill();
                if (p.z > 0) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 240, 255, ${p.opacity * 0.1})`;
                    ctx.fill();
                }
            });

            requestAnimationFrame(animateBG);
        }
        animateBG();

        document.addEventListener('mousemove', (e) => {
            targetRotY = (e.clientX / window.innerWidth - 0.5) * 1.5;
            targetRotX = (e.clientY / window.innerHeight - 0.5) * 1;
        });
    </script>
</body>
</html>
