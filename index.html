<!DOCTYPE html>
<html>
<head>
    <title>VENOM KEY GENERATOR</title>

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            width: 400px;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        select, button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
        }

        select {
            background: #2b2b2b;
            color: white;
        }

        button {
            background: #00a2ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="box">

    <h1>VENOM KEY GENERATOR</h1>

    <select id="duration">
        <option value="1h">1 Hour</option>
        <option value="5h">5 Hour</option>
        <option value="1d">1 Day</option>
        <option value="3d">3 Day</option>
        <option value="7d">7 Day</option>
        <option value="15d">15 Day</option>
        <option value="30d">30 Day</option>
        <option value="60d">60 Day</option>
    </select>

    <button onclick="generateKey()">
        Generate Key
    </button>

    <div class="result" id="result"></div>

</div>

<script>

async function generateKey() {

    const duration = document.getElementById('duration').value;

    const req = await fetch('/generate', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ duration })
    });

    const data = await req.json();

    if (data.success) {

        document.getElementById('result').innerHTML = `
            <h3>Generated Successfully</h3>
            <p><b>KEY:</b><br>${data.key}</p>
            <p><b>EXPIRES:</b><br>${data.expires}</p>
        `;

    } else {

        document.getElementById('result').innerHTML = data.message;
    }
}

</script>

</body>
</html>
