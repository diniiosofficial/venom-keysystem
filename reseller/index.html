<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
LEGACY CORE RESELLER
</title>

<link
href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap"
rel="stylesheet"
/>

<style>

:root{

    --bg:#050505;

    --card:#111111;

    --border:#1f1f1f;

    --primary:#00f0ff;

    --success:#00ff88;

    --danger:#ff4d6d;

    --text:#ffffff;

    --muted:#8b8b8b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:
    radial-gradient(circle at top,#0d1b2a,#050505);

    color:var(--text);

    font-family:
    'Space Grotesk',
    sans-serif;

    min-height:100vh;

    overflow-x:hidden;
}

/* ----------------------------- */
/* PARTICLES */
/* ----------------------------- */

.bg{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-1;

    pointer-events:none;
}

.circle{

    position:absolute;

    border-radius:50%;

    background:
    rgba(0,240,255,0.05);

    animation:
    float 12s infinite linear;
}

.circle:nth-child(1){

    width:300px;
    height:300px;

    left:-100px;
    top:-100px;
}

.circle:nth-child(2){

    width:240px;
    height:240px;

    right:-80px;
    bottom:-80px;
}

@keyframes float{

    0%{
        transform:
        translateY(0px)
        rotate(0deg);
    }

    50%{
        transform:
        translateY(-25px)
        rotate(180deg);
    }

    100%{
        transform:
        translateY(0px)
        rotate(360deg);
    }
}

/* ----------------------------- */
/* TOPBAR */
/* ----------------------------- */

.topbar{

    min-height:75px;

    background:
    rgba(10,10,10,0.7);

    backdrop-filter:
    blur(20px);

    border-bottom:
    1px solid var(--border);

    display:flex;

    justify-content:
    space-between;

    align-items:center;

    padding:18px 30px;

    flex-wrap:wrap;

    gap:15px;
}

.logo{

    font-size:28px;

    font-weight:700;

    background:
    linear-gradient(
        90deg,
        var(--primary),
        var(--success)
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:
    transparent;
}

.top-buttons{

    display:flex;

    gap:12px;

    flex-wrap:wrap;
}

.btn{

    border:none;

    background:
    linear-gradient(
        135deg,
        var(--primary),
        #00c8d4
    );

    color:black;

    padding:12px 20px;

    border-radius:14px;

    font-size:14px;

    font-weight:700;

    cursor:pointer;

    transition:0.3s;
}

.btn:hover{

    transform:
    translateY(-2px);

    box-shadow:
    0 10px 30px rgba(0,240,255,0.2);
}

.logout{

    background:
    linear-gradient(
        135deg,
        #ff4d6d,
        #ff1f4b
    );

    color:white;
}

/* ----------------------------- */
/* CONTAINER */
/* ----------------------------- */

.container{

    padding:30px;
}

/* ----------------------------- */
/* STATS */
/* ----------------------------- */

.stats{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(230px,1fr));

    gap:20px;

    margin-bottom:30px;
}

.card{

    background:
    rgba(17,17,17,0.85);

    border:
    1px solid var(--border);

    border-radius:22px;

    padding:25px;

    backdrop-filter:
    blur(18px);
}

.card h2{

    color:var(--muted);

    font-size:14px;

    margin-bottom:12px;
}

.card span{

    font-size:38px;

    font-weight:700;
}

/* ----------------------------- */
/* TABLE */
/* ----------------------------- */

.table-box{

    background:
    rgba(17,17,17,0.85);

    border:
    1px solid var(--border);

    border-radius:22px;

    overflow:auto;

    backdrop-filter:
    blur(18px);
}

.table-header{

    padding:22px;

    font-size:18px;

    font-weight:700;

    border-bottom:
    1px solid var(--border);
}

table{

    width:100%;

    border-collapse:collapse;

    min-width:900px;
}

th{

    background:#171717;

    color:#9f9f9f;

    font-size:13px;

    text-align:left;

    padding:16px;
}

td{

    padding:16px;

    border-top:
    1px solid var(--border);

    font-size:14px;
}

tr:hover{

    background:
    rgba(255,255,255,0.02);
}

/* ----------------------------- */
/* STATUS */
/* ----------------------------- */

.active{

    color:var(--success);

    font-weight:700;
}

.expired{

    color:var(--danger);

    font-weight:700;
}

.disabled{

    color:orange;

    font-weight:700;
}

/* ----------------------------- */
/* MOBILE */
/* ----------------------------- */

@media(max-width:768px){

    .topbar{

        flex-direction:column;

        align-items:flex-start;
    }

    .top-buttons{

        width:100%;
    }

    .btn{

        flex:1;
    }

    .container{

        padding:20px;
    }
}

</style>

</head>

<body>

<!-- BG -->

<div class="bg">

    <div class="circle"></div>

    <div class="circle"></div>

</div>

<!-- TOPBAR -->

<div class="topbar">

    <div class="logo">
        LEGACY CORE
    </div>

    <div class="top-buttons">

        <button
        class="btn"
        onclick="
        window.location.href=
        '/generatekey';
        ">
            Generate Key
        </button>

        <button
        class="btn logout"
        onclick="logout()">
            Logout
        </button>

    </div>

</div>

<!-- CONTAINER -->

<div class="container">

    <!-- STATS -->

    <div class="stats">

        <div class="card">

            <h2>
                My Keys
            </h2>

            <span id="totalKeys">
                0
            </span>

        </div>

        <div class="card">

            <h2>
                Active Keys
            </h2>

            <span id="activeKeys">
                0
            </span>

        </div>

        <div class="card">

            <h2>
                Expired Keys
            </h2>

            <span id="expiredKeys">
                0
            </span>

        </div>

        <div class="card">

            <h2>
                Devices Used
            </h2>

            <span id="deviceCount">
                0
            </span>

        </div>

    </div>

    <!-- TABLE -->

    <div class="table-box">

        <div class="table-header">
            My Generated Keys
        </div>

        <table>

            <thead>

                <tr>

                    <th>KEY</th>

                    <th>STATUS</th>

                    <th>DEVICES</th>

                    <th>EXPIRY</th>

                </tr>

            </thead>

            <tbody id="keyTable">

            </tbody>

        </table>

    </div>

</div>

<script>

// =============================
// AUTH CHECK
// =============================

const token =
localStorage.getItem(
    'legacy_token'
);

const role =
localStorage.getItem(
    'legacy_role'
);

const username =
localStorage.getItem(
    'legacy_username'
);

if(

    !token ||

    role !== 'reseller'
){

    window.location =
    '/login';
}

// =============================
// LOGOUT
// =============================

function logout(){

    localStorage.clear();

    window.location =
    '/login';
}

// =============================
// LOAD RESELLER KEYS
// =============================

async function loadKeys(){

    try{

        const res =
        await fetch(

            '/api/get-keys?owner='
            +
            username
        );

        const data =
        await res.json();

        const table =
        document.getElementById(
            'keyTable'
        );

        table.innerHTML = '';

        let total = 0;

        let active = 0;

        let expired = 0;

        let devices = 0;

        data.keys.forEach(key => {

            total++;

            let statusClass =
            'active';

            let displayStatus =
            key.status;

            if(
                key.status ===
                'disabled'
            ){

                statusClass =
                'disabled';
            }

            if(

                new Date(
                    key.expires_at
                ).getTime()

                <

                Date.now()
            ){

                statusClass =
                'expired';

                displayStatus =
                'expired';

                expired++;

            } else {

                active++;
            }

            let used = 0;

            try{

                const hwids =
                JSON.parse(
                    key.hwids || '[]'
                );

                used =
                hwids.length;

                devices += used;

            }catch{}

            table.innerHTML += `

            <tr>

                <td>
                    ${key.license_key}
                </td>

                <td class="${statusClass}">
                    ${displayStatus}
                </td>

                <td>
                    ${used}
                    /
                    ${key.max_devices}
                </td>

                <td>
                    ${new Date(
                        key.expires_at
                    ).toLocaleString()}
                </td>

            </tr>
            `;
        });

        document.getElementById(
            'totalKeys'
        ).innerText =
        total;

        document.getElementById(
            'activeKeys'
        ).innerText =
        active;

        document.getElementById(
            'expiredKeys'
        ).innerText =
        expired;

        document.getElementById(
            'deviceCount'
        ).innerText =
        devices;

    }catch(e){

        console.log(e);
    }
}

// =============================
// INIT
// =============================

loadKeys();

setInterval(() => {

    loadKeys();

}, 10000);

</script>

</body>
</html>
