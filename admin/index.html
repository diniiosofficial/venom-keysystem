<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENOM ADMIN — Secure Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020204;
            --surface: rgba(12, 12, 22, 0.65);
            --surface-elevated: rgba(18, 18, 32, 0.8);
            --primary: #00f0ff;
            --primary-dim: rgba(0, 240, 255, 0.08);
            --primary-glow: rgba(0, 240, 255, 0.3);
            --accent: #ffd700;
            --accent-dim: rgba(255, 215, 0, 0.1);
            --text: #f0f0f5;
            --text-dim: #6b6b7b;
            --success: #00ff9d;
            --error: #ff3860;
            --border: rgba(255, 255, 255, 0.05);
            --border-hover: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            cursor: none;
        }

        /* ===== PRELOADER ===== */
        .preloader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
        }
        .preloader.done { opacity: 0; visibility: hidden; pointer-events: none; }
        .preloader-logo {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 40px;
        }
        .preloader-logo span { color: var(--primary); }
        .preloader-bar {
            width: 200px;
            height: 1px;
            background: rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        .preloader-bar::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            animation: loadBar 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes loadBar {
            0% { width: 0%; }
            50% { width: 60%; }
            100% { width: 100%; }
        }
        .preloader-percent {
            margin-top: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }

        /* ===== CUSTOM CURSOR ===== */
        .cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            mix-blend-mode: difference;
            transition: transform 0.15s ease, width 0.3s ease, height 0.3s ease;
            transform: translate(-50%, -50%);
        }
        .cursor.hover {
            width: 40px;
            height: 40px;
            background: transparent;
            border: 1.5px solid var(--primary);
            mix-blend-mode: normal;
        }
        .cursor-trail {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ===== 3D BACKGROUND CANVAS ===== */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== NOISE OVERLAY ===== */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* ===== VIGNETTE ===== */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 0%, transparent 40%, rgba(0,0,0,0.6) 100%);
        }

        /* ===== FLOATING GEOMETRIC SHAPES ===== */
        .geo-shape {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            opacity: 0.04;
        }
        .geo-ring {
            width: 400px;
            height: 400px;
            border: 1px solid var(--primary);
            border-radius: 50%;
            top: 10%;
            right: -100px;
            animation: geoFloat1 25s ease-in-out infinite;
        }
        .geo-ring-2 {
            width: 300px;
            height: 300px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            bottom: 15%;
            left: -80px;
            animation: geoFloat2 30s ease-in-out infinite;
        }
        .geo-diamond {
            width: 150px;
            height: 150px;
            border: 1px solid var(--primary);
            transform: rotate(45deg);
            top: 60%;
            right: 15%;
            animation: geoFloat3 20s ease-in-out infinite;
        }
        @keyframes geoFloat1 {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            33% { transform: translate(-30px, 40px) rotate(120deg); }
            66% { transform: translate(20px, -20px) rotate(240deg); }
        }
        @keyframes geoFloat2 {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            50% { transform: translate(40px, -30px) rotate(180deg); }
        }
        @keyframes geoFloat3 {
            0%, 100% { transform: translate(0,0) rotate(45deg); }
            50% { transform: translate(-20px, 30px) rotate(225deg); }
        }

        /* ===== MAIN LAYOUT ===== */
        .main-wrap {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            perspective: 1200px;
        }

        /* ===== 3D CARD ===== */
        .card-3d {
            width: 460px;
            max-width: 95vw;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 48px 40px;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.02),
                0 25px 80px rgba(0,0,0,0.6),
                0 0 100px rgba(0, 240, 255, 0.04);
            animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both,
                       cardBreathe 6s ease-in-out infinite 2s;
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(60px) rotateX(15deg) scale(0.92);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0) scale(1);
            }
        }
        @keyframes cardBreathe {
            0%, 100% { box-shadow: 0 25px 80px rgba(0,0,0,0.6), 0 0 100px rgba(0, 240, 255, 0.04); }
            50% { box-shadow: 0 25px 80px rgba(0,0,0,0.6), 0 0 140px rgba(0, 240, 255, 0.07); }
        }

        /* Card inner glow */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            padding: 1.5px;
            background: conic-gradient(
                from 0deg at 50% 50%,
                rgba(0, 240, 255, 0.35) 0deg,
                rgba(255, 215, 0, 0.15) 72deg,
                rgba(255,255,255,0) 144deg,
                rgba(255,255,255,0) 216deg,
                rgba(0, 240, 255, 0.15) 288deg,
                rgba(0, 240, 255, 0.35) 360deg
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            animation: borderSpin 12s linear infinite;
        }
        @keyframes borderSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Card ambient light */
        .card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(0, 240, 255, 0.06) 0%, transparent 50%);
            pointer-events: none;
            transition: background 0.3s ease;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 36px;
            position: relative;
            z-index: 2;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            position: relative;
            animation: fadeSlideUp 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .logo-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.3));
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.08), rgba(255, 215, 0, 0.04));
            border: 1px solid rgba(0, 240, 255, 0.12);
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 24px;
            animation: fadeSlideUp 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .badge-dot {
            width: 5px;
            height: 5px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary-glow);
            animation: dotPulse 2.5s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1.05;
            animation: fadeSlideUp 0.8s 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        h1 .line1 {
            display: block;
            background: linear-gradient(135deg, #fff 0%, #a0a0b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h1 .line2 {
            display: block;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 2px;
        }

        .subtitle {
            margin-top: 14px;
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 400;
            letter-spacing: 0.02em;
            animation: fadeSlideUp 0.8s 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== DIVIDER ===== */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            margin: 28px 0 32px;
            position: relative;
            animation: fadeSlideUp 0.8s 0.85s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .divider::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
            animation: fadeSlideUp 0.8s 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .form-group:nth-child(2) {
            animation-delay: 0.95s;
        }

        .label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 10px;
            padding-left: 4px;
            transition: color 0.3s ease;
        }
        .label svg {
            width: 13px;
            height: 13px;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }
        .form-group:focus-within .label { color: var(--primary); }
        .form-group:focus-within .label svg { opacity: 1; }

        .input-wrap {
            position: relative;
        }

        input {
            width: 100%;
            padding: 16px 16px 16px 46px;
            background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: none;
            outline: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        input::placeholder {
            color: var(--text-dim);
            font-weight: 400;
            opacity: 0.6;
        }
        input:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border-color: rgba(255,255,255,0.08);
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-dim), 0 0 30px rgba(0, 240, 255, 0.08);
        }
        input.error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(255, 56, 96, 0.1), 0 0 25px rgba(255, 56, 96, 0.06);
            animation: shake 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-dim);
            transition: all 0.4s ease;
            pointer-events: none;
        }
        .form-group:focus-within .input-icon {
            color: var(--primary);
            filter: drop-shadow(0 0 6px var(--primary-glow));
        }

        .input-glow {
            position: absolute;
            inset: -1px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
            filter: blur(10px);
        }
        .form-group:focus-within .input-glow { opacity: 0.12; }

        /* ===== BUTTON ===== */
        .btn-wrap {
            position: relative;
            z-index: 2;
            animation: fadeSlideUp 0.8s 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .btn-login {
            width: 100%;
            padding: 18px 28px;
            background: linear-gradient(135deg, var(--primary) 0%, #00c8d4 50%, var(--accent) 100%);
            background-size: 200% 200%;
            animation: gradientShift 4s ease infinite;
            border: none;
            border-radius: 16px;
            color: #000;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: none;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 30px rgba(0, 240, 255, 0.2), 0 0 60px rgba(0, 240, 255, 0.05);
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .btn-login:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 40px rgba(0, 240, 255, 0.35), 0 0 80px rgba(0, 240, 255, 0.1);
        }
        .btn-login:hover::before { opacity: 1; }
        .btn-login:active {
            transform: translateY(-1px) scale(0.99);
        }
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            animation: none;
        }

        .btn-text {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-icon {
            width: 18px;
            height: 18px;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-login:hover .btn-icon {
            transform: translateX(4px);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(0,0,0,0.15);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .btn-login.loading .btn-text span,
        .btn-login.loading .btn-icon { display: none; }
        .btn-login.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== ERROR ===== */
        .msg-wrap {
            margin-top: 18px;
            min-height: 22px;
            position: relative;
            z-index: 2;
            animation: fadeSlideUp 0.8s 1.05s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .msg-error {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--error);
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .msg-error.show {
            opacity: 1;
            transform: translateY(0);
        }
        .msg-error svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 28px;
            text-align: center;
            position: relative;
            z-index: 2;
            animation: fadeSlideUp 0.8s 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .footer-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 11px;
            color: rgba(255,255,255,0.12);
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .footer-line::before,
        .footer-line::after {
            content: '';
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1));
        }
        .footer-line::after {
            background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: rgba(12, 12, 22, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 14px;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--success);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0, 255, 157, 0.1);
            z-index: 1000;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast svg { width: 20px; height: 20px; }

        /* ===== BURST ===== */
        .burst-particle {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 560px) {
            .card { padding: 40px 24px; border-radius: 22px; }
            h1 { font-size: 26px; }
            .logo-icon { width: 48px; height: 48px; }
            .cursor, .cursor-trail { display: none; }
            body { cursor: auto; }
            input, .btn-login { cursor: pointer; }
        }
    </style>

<body>

    <!-- PRELOADER -->
    <div class="preloader" id="preloader">
        <div class="preloader-logo">VENOM <span>SYSTEMS</span></div>
        <div class="preloader-bar"></div>
        <div class="preloader-percent" id="preloaderPercent">0%</div>
    </div>

    <!-- CUSTOM CURSOR -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-trail" id="cursorTrail"></div>

    <!-- 3D BACKGROUND -->
    <canvas id="bg-canvas"></canvas>

    <!-- NOISE & VIGNETTE -->
    <div class="noise"></div>
    <div class="vignette"></div>

    <!-- FLOATING SHAPES -->
    <div class="geo-shape geo-ring"></div>
    <div class="geo-shape geo-ring-2"></div>
    <div class="geo-shape geo-diamond"></div>

    <!-- MAIN -->
    <div class="main-wrap">
        <div class="card-3d" id="card3d">
            <div class="card" id="card">

                <div class="header">
                    <div class="logo-icon">
                        <svg viewBox="0 0 56 56" fill="none">
                            <circle cx="28" cy="28" r="27" stroke="url(#logoGrad)" stroke-width="1.5"/>
                            <path d="M28 12L36 28L28 36L20 28L28 12Z" fill="url(#logoGrad)" opacity="0.2"/>
                            <path d="M28 12L36 28L28 36L20 28L28 12Z" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linejoin="round"/>
                            <circle cx="28" cy="28" r="4" fill="url(#logoGrad)"/>
                            <defs>
                                <linearGradient id="logoGrad" x1="12" y1="12" x2="44" y2="44">
                                    <stop stop-color="#00f0ff"/>
                                    <stop offset="1" stop-color="#ffd700"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="badge">
                        <span class="badge-dot"></span>
                        Restricted Access
                    </div>
                    <h1>
                        <span class="line1">VENOM</span>
                        <span class="line2">ADMIN</span>
                    </h1>
                    <p class="subtitle">Authenticate to access the control panel</p>
                </div>

                <div class="divider"></div>

                <div class="form-group">
                    <label class="label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        Username
                    </label>
                    <div class="input-wrap">
                        <input type="text" id="username" placeholder="Enter username" autocomplete="off" spellcheck="false">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <div class="input-glow"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        Password
                    </label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="Enter password">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <div class="input-glow"></div>
                    </div>
                </div>

                <div class="btn-wrap">
                    <button class="btn-login" onclick="login()" id="loginBtn">
                        <div class="btn-text">
                            <span>Authenticate</span>
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </div>
                        <div class="spinner"></div>
                    </button>
                </div>

                <div class="msg-wrap">
                    <div class="msg-error" id="msgError">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <span id="msgText">Invalid credentials</span>
                    </div>
                </div>

                <div class="footer">
                    <div class="footer-line">VENOM SYSTEMS v2.0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span>Authentication successful</span>
    </div>

    <script>
        // ===== PRELOADER =====
        const preloader = document.getElementById('preloader');
        const preloaderPercent = document.getElementById('preloaderPercent');
        let loadProgress = 0;
        const loadInterval = setInterval(() => {
            loadProgress += Math.random() * 15 + 5;
            if (loadProgress >= 100) {
                loadProgress = 100;
                clearInterval(loadInterval);
                setTimeout(() => {
                    preloader.classList.add('done');
                }, 400);
            }
            preloaderPercent.textContent = Math.floor(loadProgress) + '%';
        }, 120);

        // ===== CUSTOM CURSOR =====
        const cursor = document.getElementById('cursor');
        const cursorTrail = document.getElementById('cursorTrail');
        let mouseX = 0, mouseY = 0;
        let trailX = 0, trailY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
        });

        function animateCursor() {
            trailX += (mouseX - trailX) * 0.15;
            trailY += (mouseY - trailY) * 0.15;
            cursorTrail.style.left = trailX + 'px';
            cursorTrail.style.top = trailY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        document.querySelectorAll('button, input').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        // ===== 3D PARTICLE SPHERE BACKGROUND =====
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let rotX = 0, rotY = 0;
        let targetRotX = 0, targetRotY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const PARTICLE_COUNT = 350;
        const SPHERE_RADIUS = Math.min(window.innerWidth, window.innerHeight) * 0.35;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = SPHERE_RADIUS * (0.3 + Math.random() * 0.7);
            particles.push({
                x: r * Math.sin(phi) * Math.cos(theta),
                y: r * Math.sin(phi) * Math.sin(theta),
                z: r * Math.cos(phi),
                baseX: r * Math.sin(phi) * Math.cos(theta),
                baseY: r * Math.sin(phi) * Math.sin(theta),
                baseZ: r * Math.cos(phi),
                size: Math.random() * 1.5 + 0.5,
                opacity: Math.random() * 0.6 + 0.2,
                speed: Math.random() * 0.002 + 0.001
            });
        }

        function project3D(x, y, z) {
            const fov = 800;
            const scale = fov / (fov + z);
            return {
                x: x * scale + canvas.width / 2,
                y: y * scale + canvas.height / 2,
                scale: scale,
                z: z
            };
        }

        function rotate3D(x, y, z, rx, ry) {
            let x1 = x * Math.cos(ry) - z * Math.sin(ry);
            let z1 = x * Math.sin(ry) + z * Math.cos(ry);
            let y2 = y * Math.cos(rx) - z1 * Math.sin(rx);
            let z2 = y * Math.sin(rx) + z1 * Math.cos(rx);
            return { x: x1, y: y2, z: z2 };
        }

        let time = 0;
        function animateBG() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += 0.003;

            rotX += (targetRotX - rotX) * 0.05;
            rotY += (targetRotY - rotY) * 0.05;
            rotY += 0.002;

            const projected = [];

            particles.forEach((p, i) => {
                const orbitSpeed = p.speed * 50;
                const angle = time * orbitSpeed + i;
                const orbitRadius = 20;
                const ox = p.baseX + Math.cos(angle) * orbitRadius;
                const oy = p.baseY + Math.sin(angle * 0.7) * orbitRadius;
                const oz = p.baseZ + Math.sin(angle * 0.5) * orbitRadius;

                const rotated = rotate3D(ox, oy, oz, rotX, rotY);
                const proj = project3D(rotated.x, rotated.y, rotated.z);
                proj.opacity = p.opacity * (0.5 + 0.5 * ((rotated.z + SPHERE_RADIUS) / (2 * SPHERE_RADIUS)));
                proj.size = p.size * proj.scale;
                projected.push({ ...proj, original: p });
            });

            projected.sort((a, b) => b.z - a.z);

            for (let i = 0; i < projected.length; i++) {
                for (let j = i + 1; j < Math.min(i + 8, projected.length); j++) {
                    const dx = projected[i].x - projected[j].x;
                    const dy = projected[i].y - projected[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        const alpha = 0.04 * (1 - dist / 120) * projected[i].opacity;
                        ctx.beginPath();
                        ctx.moveTo(projected[i].x, projected[i].y);
                        ctx.lineTo(projected[j].x, projected[j].y);
                        ctx.strokeStyle = `rgba(0, 240, 255, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            projected.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 240, 255, ${p.opacity})`;
                ctx.fill();
                if (p.z > 0) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 240, 255, ${p.opacity * 0.1})`;
                    ctx.fill();
                }
            });

            requestAnimationFrame(animateBG);
        }
        animateBG();

        document.addEventListener('mousemove', (e) => {
            targetRotY = (e.clientX / window.innerWidth - 0.5) * 1.5;
            targetRotX = (e.clientY / window.innerHeight - 0.5) * 1;
        });

        // ===== 3D CARD TILT + LIGHT =====
        const card3d = document.getElementById('card3d');
        const card = document.getElementById('card');

        document.addEventListener('mousemove', (e) => {
            const rect = card3d.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const rotateY = ((e.clientX - centerX) / rect.width) * 12;
            const rotateX = ((centerY - e.clientY) / rect.height) * 12;
            card3d.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

            const lightX = ((e.clientX - rect.left) / rect.width) * 100;
            const lightY = ((e.clientY - rect.top) / rect.height) * 100;
            card.style.setProperty('--mouse-x', lightX + '%');
            card.style.setProperty('--mouse-y', lightY + '%');
        });

        document.addEventListener('mouseleave', () => {
            card3d.style.transform = 'rotateX(0) rotateY(0)';
        });

        // ===== LOGIN =====
        async function login() {
            const btn = document.getElementById('loginBtn');
            const username = document.getElementById('username');
            const password = document.getElementById('password');
            const msgError = document.getElementById('msgError');
            const msgText = document.getElementById('msgText');
            const toast = document.getElementById('toast');

            btn.classList.add('loading');
            btn.disabled = true;
            msgError.classList.remove('show');
            username.classList.remove('error');
            password.classList.remove('error');

            await new Promise(r => setTimeout(r, 800));

            if (username.value === 'venomadmin' && password.value === 'venom@2026') {
                localStorage.setItem('venom_admin', 'true');
                toast.classList.add('show');
                createBurst();
                setTimeout(() => {
                    window.location = '/dashboard';
                }, 1200);
            } else {
                msgText.textContent = 'Invalid credentials. Access denied.';
                msgError.classList.add('show');
                username.classList.add('error');
                password.classList.add('error');
                btn.classList.remove('loading');
                btn.disabled = false;

                card3d.style.animation = 'none';
                card3d.offsetHeight;
                card3d.style.animation = 'cardShake 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
                setTimeout(() => { card3d.style.animation = ''; }, 500);
            }
        }

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });

        // ===== BURST =====
        function createBurst() {
            const colors = ['#00f0ff', '#00ff9d', '#ffd700', '#fff'];
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'burst-particle';
                p.style.left = cx + 'px';
                p.style.top = cy + 'px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.boxShadow = `0 0 6px ${p.style.background}`;
                document.body.appendChild(p);
                const ang = (Math.PI * 2 * i) / 30 + Math.random() * 0.5;
                const vel = 80 + Math.random() * 120;
                const vx = Math.cos(ang) * vel;
                const vy = Math.sin(ang) * vel;
                p.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${vx}px, ${vy}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 800 + Math.random() * 400,
                    easing: 'cubic-bezier(0.16, 1, 0.3, 1)'
                }).onfinish = () => p.remove();
            }
        }

        // Card shake keyframes
        const style = document.createElement('style');
        style.textContent = `
            @keyframes cardShake {
                0%, 100% { transform: rotateX(0) rotateY(0); }
                20% { transform: rotateX(2deg) rotateY(-3deg); }
                40% { transform: rotateX(-2deg) rotateY(3deg); }
                60% { transform: rotateX(1deg) rotateY(-2deg); }
                80% { transform: rotateX(-1deg) rotateY(2deg); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
